version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: opscore-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: opscore
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: opscore-api
    restart: always
    environment:
      DATABASE_URL: "mysql://root:root@mysql:3306/opscore"
      PORT: 3008
    ports:
      - "3008:3008"
    depends_on:
      - mysql
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: opscore-web
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  mysql_data:
