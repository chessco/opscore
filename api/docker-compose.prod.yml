services:
  api:
    container_name: opscore-api
    build:
      context: /opt/pitaya/opscore/api
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.production
    environment:
      - PORT=3005
    expose:
      - "3005"
    networks:
      - pitaya_net

networks:
  pitaya_net:
    external: true
